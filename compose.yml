# This Docker Compose file is for local testing without Kathará.
services:
  production-line-1:
    build: ./src/publisher1
    image: iiot-kathara/publisher1:latest
    entrypoint: python main.py
    environment:
      - DROPPER_URL=http://dropper:5000/data
    depends_on:
      - dropper

  dropper:
    build: ./src/dropper
    image: iiot-kathara/dropper:latest
    entrypoint: python main.py
    ports:
      - "5000:5000"
    environment:
      - DECRYPTER_URL=http://decrypter:5000/decrypt
      - FAULT_DETECTOR_URL=http://fault-detector:5000/data
      - POISSON_LAMBDA=0.1
    depends_on:
      - decrypter
      - fault-detector

  decrypter:
    build: ./src/decrypter
    image: iiot-kathara/decrypter:latest
    entrypoint: python main.py
    environment:
      - FAULT_DETECTOR_URL=http://fault-detector:5000/data
    depends_on:
      - fault-detector
  
  fault-detector:
    build: ./src/fault-detector
    image: iiot-kathara/fault-detector:latest
    entrypoint: python main.py
    environment:
      - DIGITAL_TWIN_URL=http://digital-twin:5000/update
    depends_on:
      - digital-twin

  digital-twin:
    build: ./src/digital-twin
    image: iiot-kathara/digital-twin:latest
    entrypoint: python main.py
    ports:
      - "5001:5000"